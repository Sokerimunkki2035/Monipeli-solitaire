<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpio PRO Duel</title>

<script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0d4a3a;
  color:white;
}

header {
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.controls {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

button,input {
  padding:8px;
  border-radius:6px;
  border:none;
  font-weight:bold;
}

button { background:#2a8b6f; color:white; }

#panel { font-size:14px; }

#table {
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}

.column {
  width:70px;
}

/* 🔥 FIXATTU KORTTI */
.card {
  height:90px;
  margin-top:-70px;
  border-radius:6px;
  background:white;
  color:black;
  padding:6px;
  font-weight:bold;
  position:relative;
  box-shadow:0 2px 5px rgba(0,0,0,0.4);
}

.card:first-child {
  margin-top:0;
}

.face-down {
  background:#1a5f4a;
  color:transparent;
}

.selected {
  outline:3px solid yellow;
}

/* 🔥 näkyvät tekstit */
.card .top {
  position:absolute;
  top:4px;
  left:6px;
}

.card .bottom {
  position:absolute;
  bottom:4px;
  right:6px;
  font-size:18px;
}

.red { color:red; }

</style>
</head>

<body>

<header>

<div class="controls">
  <input id="player" placeholder="nimi">
  <input id="seedInput" placeholder="seed">
  <button onclick="newGame()">Uusi</button>
  <button onclick="createChallenge()">Haaste</button>
</div>

<div class="controls">
  <input id="challengeInput" placeholder="koodi">
  <button onclick="loadChallenge()">Liity</button>
</div>

<div id="panel"></div>

</header>

<div id="table"></div>

<script>
const suits=["♠","♣","♦","♥"];

let columns=[], selected=null;
let moves=0, startTime=0, timer;
let opponent=null;
let round=1;

let stats = JSON.parse(localStorage.getItem("scorpio_stats")||"{}");
if(!stats.rating) stats={games:0,wins:0,time:0,best:9999,rating:1000};

function saveStats(){
  localStorage.setItem("scorpio_stats",JSON.stringify(stats));
}

function startTimer(){
  startTime=Date.now();
  clearInterval(timer);
  timer=setInterval(updatePanel,1000);
}

function updatePanel(){
  let t=Math.floor((Date.now()-startTime)/1000);
  document.getElementById("panel").innerHTML =
    `⏱ ${t}s | 🔁 ${moves} | 🎯 ${stats.rating}<br>
     🏆 BO5: ${stats.wins}-${stats.games-stats.wins} (round ${round}/5)<br>
     📊 Avg: ${stats.games?Math.floor(stats.time/stats.games):0}s | Best: ${stats.best}s`;
}

function newDeck(seed){
  Math.seedrandom(seed);
  let deck=[];
  for(let s=0;s<4;s++){
    for(let r=1;r<=13;r++){
      deck.push({s,r,up:true});
    }
  }

  for(let i=deck.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }

  return deck;
}

function newGame(){
  let seed=document.getElementById("seedInput").value || Math.random().toString(36).slice(2);
  document.getElementById("seedInput").value=seed;

  let deck=newDeck(seed);
  columns=Array.from({length:7},()=>[]);

  for(let i=0;i<7;i++){
    for(let j=0;j<7;j++){
      let card=deck.pop();
      card.up = !(i<3 && j<3);
      columns[i].push(card);
    }
  }

  moves=0;
  startTimer();
  draw();
}

function draw(){
  const table=document.getElementById("table");
  table.innerHTML="";

  columns.forEach((col,ci)=>{
    let div=document.createElement("div");
    div.className="column";

    col.forEach((card,ri)=>{
      let c=document.createElement("div");
      c.className="card";

      if(!card.up) c.classList.add("face-down");

      if(selected && selected.c===ci && ri>=selected.r){
        c.classList.add("selected");
      }

      if(card.up){
        c.innerHTML = `
          <div class="top ${card.s>=2?'red':''}">
            ${rank(card.r)}${suits[card.s]}
          </div>
          <div class="bottom ${card.s>=2?'red':''}">
            ${suits[card.s]}
          </div>
        `;
      }

      c.onclick=(e)=>{ e.stopPropagation(); clickCard(ci,ri); };

      div.appendChild(c);
    });

    div.onclick=()=>move(ci);
    table.appendChild(div);
  });
}

function rank(r){
  return {1:"A",11:"J",12:"Q",13:"K"}[r]||r;
}

function clickCard(c,r){
  let col=columns[c];

  for(let i=r;i<col.length-1;i++){
    if(col[i].r!==col[i+1].r+1) return;
  }

  selected = (selected && selected.c===c && selected.r===r) ? null : {c,r};
  draw();
}

function move(target){
  if(!selected) return;

  let from=columns[selected.c];
  let to=columns[target];
  let moving=from.slice(selected.r);

  if(to.length===0 || to[to.length-1].r===moving[0].r+1){
    columns[target]=to.concat(moving);
    columns[selected.c]=from.slice(0,selected.r);

    if(columns[selected.c].length){
      columns[selected.c][columns[selected.c].length-1].up=true;
    }

    moves++;
  }

  selected=null;
  draw();
  checkWin();
}

function updateRating(win){
  stats.rating += win ? 15 : -10;
}

function checkWin(){
  let win = columns.every(col =>
    col.length===13 &&
    col.every((c,i)=> i===0 || col[i-1].r===c.r+1)
  );

  if(win){
    clearInterval(timer);
    let time=Math.floor((Date.now()-startTime)/1000);

    stats.games++;
    stats.time += time;
    stats.best = Math.min(stats.best, time);

    let winResult=false;

    if(opponent){
      winResult = time < opponent.time;
      if(winResult) stats.wins++;
      updateRating(winResult);
    }

    saveStats();

    round++;
    if(round>5){
      alert(`🏆 BO5 valmis!\nVoitot: ${stats.wins}`);
      round=1;
      stats.wins=0;
      stats.games=0;
    }

    alert(`🎉 ${time}s | Rating ${stats.rating}`);
  }
}

function createChallenge(){
  let seed=document.getElementById("seedInput").value;
  let time=Math.floor((Date.now()-startTime)/1000);
  let code=`${seed}|${time}|${moves}`;
  navigator.clipboard.writeText(code);
  alert("Kopioitu:\n"+code);
}

function loadChallenge(){
  let [seed,time,m]=document.getElementById("challengeInput").value.split("|");
  opponent={time:Number(time), moves:Number(m)};
  document.getElementById("seedInput").value=seed;
  newGame();
}

newGame();
</script>

</body>
</html>
