<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itsmyid Arena - Player Edition</title>
    <style>
        :root {
            --card-width: 32px;
            --card-height: 48px;
            --green: #1b5e20;
        }
        body {
            font-family: sans-serif;
            background-color: var(--green);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            touch-action: none;
        }
        #ui-layer {
            background: rgba(0,0,0,0.95);
            padding: 5px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            z-index: 1000;
        }
        .control-row { grid-column: span 2; display: flex; gap: 5px; justify-content: center; margin-bottom: 3px; }
        .stat-box { background: #333; padding: 3px; border-radius: 4px; text-align: center; font-size: 0.75em; }
        .stats-summary { grid-column: span 2; text-align: center; font-size: 0.8em; font-weight: bold; color: gold; padding: 4px 0; }
        
        #game-board {
            display: flex;
            justify-content: center;
            gap: 2px;
            padding: 5px 2px;
            flex-grow: 1;
            position: relative;
        }
        .column {
            width: var(--card-width);
            height: 100%;
            background: rgba(255,255,255,0.05);
            position: relative;
        }
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: white;
            border-radius: 2px;
            position: absolute;
            color: black;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 2px;
            font-weight: bold;
            font-size: 0.9em;
            border: 0.5px solid #666;
            box-sizing: border-box;
        }
        .card.back { background: #0d47a1; color: transparent; border: 1px solid white; }
        .card.selected { border: 2px solid #ffeb3b; z-index: 100 !important; transform: scale(1.05); }
        
        .action-btn { background:#1565c0; padding: 8px; text-align: center; font-size: 0.8em; border-radius: 4px; cursor: pointer; user-select: none; }
        .undo-btn { background: #555; }
        
        #name-input { background: #222; color: white; border: 1px solid #444; width: 80px; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="control-row">
        <input type="text" id="player-name" placeholder="Nimimerkki" onchange="saveName()" style="width: 100px; font-size: 0.8em; padding: 4px;">
        <select id="game-mode" onchange="initGame()" style="font-size: 0.8em;">
            <option value="spider">Spider</option>
            <option value="scorpio">Scorpio</option>
        </select>
        <button onclick="initGame()" style="background: #4caf50; color: white; border: none; padding: 4px 10px; border-radius: 4px;">JAO</button>
    </div>
    <div class="stat-box">Pisteet: <span id="score">500</span></div>
    <div class="stat-box">Siirrot: <span id="move-count">0</span></div>
    <div class="stats-summary" id="win-display">Pelaaja: - | Voitot: 0</div>
    <div class="action-btn undo-btn" onclick="undo()">PERUUTA</div>
    <div id="deck-btn" class="action-btn" onclick="dealMore()">JAA LISÄÄ</div>
</div>

<div id="game-board"></div>

<script>
    let moves = 0, score = 500, deck = [], currentGame = 'spider';
    let selectedPino = null, sourceColIdx = null;
    let history = [];

    // TALLENNUS JA NIMI
    function saveName() {
        const name = document.getElementById('player-name').value;
        localStorage.setItem('solitaire_player', name);
        updateWinUI();
    }

    function saveWin() {
        let wins = parseInt(localStorage.getItem('solitaire_wins') || '0');
        wins++;
        localStorage.setItem('solitaire_wins', wins);
        updateWinUI();
    }

    function updateWinUI() {
        const name = localStorage.getItem('solitaire_player') || 'Pelaaja 1';
        const wins = localStorage.getItem('solitaire_wins') || '0';
        document.getElementById('player-name').value = localStorage.getItem('solitaire_player') || '';
        document.getElementById('win-display').innerText = `${name} | Voitot: ${wins}`;
    }

    // PELIN LOGIIKKA (Peruutus jne)
    function saveState() {
        const state = {
            board: Array.from(document.querySelectorAll('.column')).map(col => {
                return Array.from(col.children).map(card => ({
                    v: card.dataset.value,
                    back: card.classList.contains('back')
                }));
            }),
            deck: [...deck],
            score: score,
            moves: moves
        };
        history.push(JSON.stringify(state));
        if (history.length > 25) history.shift();
    }

    function undo() {
        if (history.length === 0) return;
        const state = JSON.parse(history.pop());
        deck = state.deck; score = state.score; moves = state.moves;
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        state.board.forEach((colData, i) => {
            const col = document.createElement('div');
            col.className = 'column'; col.id = 'col-' + i;
            col.onclick = (e) => handleColClick(i, e);
            board.appendChild(col);
            colData.forEach(cardData => addCard(i, cardData, !cardData.back, true));
        });
        updateStats();
    }

    function mulberry32(a) {
        return function() {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    function initGame() {
        const seedVal = Math.random().toString(); // Automaattinen uusi siemen jos tyhjä
        const rng = mulberry32(Array.from(seedVal).reduce((a,b)=>(((a<<5)-a)+b.charCodeAt(0))|0,0));
        currentGame = document.getElementById('game-mode').value;
        moves = 0; score = 500; deck = []; selectedPino = null; history = [];
        
        const decks = (currentGame === 'spider') ? 8 : 4;
        for(let i=0; i<decks; i++) for(let v=1; v<=13; v++) deck.push({v});
        for(let i=deck.length-1; i>0; i--) { const j=Math.floor(rng()*(i+1)); [deck[i], deck[j]]=[deck[j], deck[i]]; }
        
        renderBoard();
        dealInitial();
        updateStats();
        updateWinUI();
        document.getElementById('deck-btn').style.visibility = 'visible';
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        const count = (currentGame === 'spider') ? 10 : 7;
        for(let i=0; i<count; i++) {
            const col = document.createElement('div');
            col.className = 'column'; col.id = 'col-' + i;
            col.onclick = (e) => handleColClick(i, e);
            board.appendChild(col);
        }
    }

    function dealInitial() {
        if(currentGame === 'spider') {
            for(let i=0; i<54; i++) addCard(i%10, deck.pop(), i>=44);
        } else {
            for(let i=0; i<49; i++) {
                const c = i%7, r = Math.floor(i/7);
                addCard(c, deck.pop(), !(c<3 && r<3));
            }
        }
    }

    function addCard(colIdx, data, visible) {
        const col = document.getElementById('col-' + colIdx);
        const card = document.createElement('div');
        card.className = 'card' + (visible ? '' : ' back');
        card.dataset.value = data.v;
        if(visible) card.innerHTML = `<div>${{1:'A',11:'J',12:'Q',13:'K'}[data.v]||data.v}</div><div style="font-size:0.7em">♠</div>`;
        card.onclick = (e) => { e.stopPropagation(); handleCardClick(colIdx, card); };
        col.appendChild(card);
        fixOffsets(col);
    }

    function handleCardClick(colIdx, card) {
        if (card.classList.contains('back')) return;
        const col = document.getElementById('col-' + colIdx);
        const cards = Array.from(col.children);
        const cardIdx = cards.indexOf(card);
        if (currentGame === 'spider') {
            for (let i = cardIdx; i < cards.length - 1; i++) {
                if (parseInt(cards[i].dataset.value) !== parseInt(cards[i+1].dataset.value) + 1) return;
            }
        }
        if (selectedPino) selectedPino.forEach(c => c.classList.remove('selected'));
        selectedPino = cards.slice(cardIdx);
        sourceColIdx = colIdx;
        selectedPino.forEach(c => c.classList.add('selected'));
    }

    function handleColClick(colIdx, e) {
        if (!selectedPino) return;
        const targetCol = document.getElementById('col-' + colIdx);
        const sourceCol = document.getElementById('col-' + sourceColIdx);
        const movingVal = parseInt(selectedPino[0].dataset.value);
        const targetLast = targetCol.lastElementChild;

        let canDrop = false;
        if (!targetLast) { if (movingVal === 13) canDrop = true; }
        else if (parseInt(targetLast.dataset.value) === movingVal + 1) canDrop = true;

        if (canDrop) {
            saveState();
            selectedPino.forEach(c => { c.classList.remove('selected'); targetCol.appendChild(c); });
            moves++; score--;
            if (sourceCol.lastElementChild?.classList.contains('back')) {
                const c = sourceCol.lastElementChild; c.classList.remove('back');
                c.innerHTML = `<div>${{1:'A',11:'J',12:'Q',13:'K'}[c.dataset.value]||c.dataset.value}</div><div style="font-size:0.7em">♠</div>`;
            }
            selectedPino = null; fixOffsets(sourceCol); fixOffsets(targetCol); checkWin(targetCol); updateStats();
        }
    }

    function fixOffsets(col) {
        const cards = Array.from(col.children);
        cards.forEach((c, i) => {
            let offset = 0;
            for(let j=0; j<i; j++) offset += cards[j].classList.contains('back') ? 6 : 14;
            c.style.top = offset + 'px';
        });
    }

    function dealMore() {
        saveState();
        if(currentGame === 'spider') {
            if(deck.length === 0) return;
            for(let i=0; i<10; i++) addCard(i, deck.pop(), true);
        } else if(deck.length > 0) {
            for(let i=0; i<3; i++) addCard(i, deck.pop(), true);
            document.getElementById('deck-btn').style.visibility = 'hidden';
        }
        moves++; score--; updateStats();
    }

    function checkWin(col) {
        const cards = Array.from(col.children);
        if (cards.length < 13) return;
        for (let i = 0; i <= cards.length - 13; i++) {
            let seq = true;
            for (let j = 0; j < 12; j++) {
                if (parseInt(cards[i+j].dataset.value) !== parseInt(cards[i+j+1].dataset.value) + 1 || cards[i+j].classList.contains('back')) {
                    seq = false; break;
                }
            }
            if (seq && parseInt(cards[i].dataset.value) === 13) {
                for (let k = 0; k < 13; k++) col.removeChild(cards[i+k]);
                score += 100;
                if (col.lastElementChild?.classList.contains('back')) {
                     const c = col.lastElementChild; c.classList.remove('back');
                     c.innerHTML = `<div>${{1:'A',11:'J',12:'Q',13:'K'}[c.dataset.value]||c.dataset.value}</div><div style="font-size:0.7em">♠</div>`;
                }
                fixOffsets(col);
                if (document.querySelectorAll('.card').length === 0) {
                    saveWin();
                    alert("ONNEA VOITOSTA!");
                }
                break;
            }
        }
    }

    function updateStats() {
        document.getElementById('move-count').innerText = moves;
        document.getElementById('score').innerText = score;
    }

    window.onload = initGame;
</script>
</body>
</html>
