<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itsmyid Arena - Scorpio Fix</title>
    <style>
        :root {
            --card-width: 32px;
            --card-height: 48px;
            --green: #1b5e20;
        }
        body {
            font-family: sans-serif;
            background-color: var(--green);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            touch-action: none;
        }
        #ui-layer {
            background: rgba(0,0,0,0.95);
            padding: 5px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            z-index: 1000;
        }
        .control-row { grid-column: span 2; display: flex; gap: 5px; justify-content: center; }
        .stat-box { background: #333; padding: 3px; border-radius: 4px; text-align: center; font-size: 0.75em; }
        
        #game-board {
            display: flex;
            justify-content: center;
            gap: 2px;
            padding: 5px 2px;
            flex-grow: 1;
            position: relative;
        }
        .column {
            width: var(--card-width);
            height: 100%;
            background: rgba(255,255,255,0.05);
            position: relative;
        }
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: white;
            border-radius: 2px;
            position: absolute;
            color: black;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 2px;
            font-weight: bold;
            font-size: 0.9em;
            border: 0.5px solid #666;
            box-sizing: border-box;
            pointer-events: auto; /* Sallitaan klikkaus suoraan korttiin */
        }
        .card.back { background: #0d47a1; color: transparent; border: 1px solid white; }
        .card.selected { border: 2px solid #ffeb3b; z-index: 100 !important; transform: scale(1.05); }
        
        #deck-btn { background:#1565c0; grid-column: span 2; padding: 8px; text-align: center; font-size: 0.8em; border-radius: 4px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="control-row">
        <select id="game-mode" onchange="initGame()">
            <option value="spider">Spider</option>
            <option value="scorpio">Scorpio</option>
        </select>
        <input type="text" id="seed-input" placeholder="Siemen" style="width: 60px;">
        <button onclick="initGame()" style="background: #4caf50; color: white;">JAO</button>
    </div>
    <div class="stat-box">Pisteet: <span id="score">500</span></div>
    <div class="stat-box">Siirrot: <span id="move-count">0</span></div>
    <div id="deck-btn" onclick="dealMore()">JAA LISÄÄ</div>
</div>

<div id="game-board"></div>

<script>
    let moves = 0, score = 500, deck = [], currentGame = 'spider';
    let selectedPino = null, sourceColIdx = null;

    function mulberry32(a) {
        return function() {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    function initGame() {
        const seedVal = document.getElementById('seed-input').value || Math.random().toString();
        const rng = mulberry32(Array.from(seedVal).reduce((a,b)=>(((a<<5)-a)+b.charCodeAt(0))|0,0));
        currentGame = document.getElementById('game-mode').value;
        moves = 0; score = 500; deck = []; selectedPino = null;
        
        const decks = (currentGame === 'spider') ? 8 : 4;
        for(let i=0; i<decks; i++) for(let v=1; v<=13; v++) deck.push({v});
        for(let i=deck.length-1; i>0; i--) { const j=Math.floor(rng()*(i+1)); [deck[i], deck[j]]=[deck[j], deck[i]]; }
        
        renderBoard();
        dealInitial();
        updateStats();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        const count = (currentGame === 'spider') ? 10 : 7;
        for(let i=0; i<count; i++) {
            const col = document.createElement('div');
            col.className = 'column';
            col.id = 'col-' + i;
            col.onclick = (e) => handleColClick(i, e);
            board.appendChild(col);
        }
    }

    function dealInitial() {
        if(currentGame === 'spider') {
            for(let i=0; i<54; i++) addCard(i%10, deck.pop(), i>=44);
        } else {
            for(let i=0; i<49; i++) {
                const c = i%7, r = Math.floor(i/7);
                addCard(c, deck.pop(), !(c<3 && r<3));
            }
        }
    }

    function addCard(colIdx, data, visible) {
        const col = document.getElementById('col-' + colIdx);
        const card = document.createElement('div');
        card.className = 'card' + (visible ? '' : ' back');
        card.dataset.value = data.v;
        if(visible) card.innerHTML = `<div>${{1:'A',11:'J',12:'Q',13:'K'}[data.v]||data.v}</div><div style="font-size:0.7em">♠</div>`;
        
        card.onclick = (e) => {
            e.stopPropagation();
            handleCardClick(colIdx, card);
        };
        
        col.appendChild(card);
        fixOffsets(col);
    }

    function handleCardClick(colIdx, card) {
        if (card.classList.contains('back')) return;
        
        const col = document.getElementById('col-' + colIdx);
        const cards = Array.from(col.children);
        const cardIdx = cards.indexOf(card);
        
        // Spider-tarkistus: saako pinon ottaa?
        if (currentGame === 'spider') {
            for (let i = cardIdx; i < cards.length - 1; i++) {
                if (parseInt(cards[i].dataset.value) !== parseInt(cards[i+1].dataset.value) + 1) return;
            }
        }

        // Valitse pino
        if (selectedPino) selectedPino.forEach(c => c.classList.remove('selected'));
        
        selectedPino = cards.slice(cardIdx);
        sourceColIdx = colIdx;
        selectedPino.forEach(c => c.classList.add('selected'));
    }

    function handleColClick(colIdx, e) {
        if (!selectedPino) return;

        const targetCol = document.getElementById('col-' + colIdx);
        const sourceCol = document.getElementById('col-' + sourceColIdx);
        const movingVal = parseInt(selectedPino[0].dataset.value);
        const targetLast = targetCol.lastElementChild;

        let canDrop = false;
        if (!targetLast) {
            if (movingVal === 13) canDrop = true; // Vain Kuningas tyhjään
        } else if (parseInt(targetLast.dataset.value) === movingVal + 1) {
            canDrop = true;
        }

        if (canDrop) {
            const isFreeKing = (movingVal === 13 && !targetLast && sourceCol.children[0] === selectedPino[0]);
            selectedPino.forEach(c => {
                c.classList.remove('selected');
                targetCol.appendChild(c);
            });
            if (!isFreeKing) { moves++; score--; }
            
            // Käännä uusi kortti esiin
            if (sourceCol.lastElementChild?.classList.contains('back')) {
                const c = sourceCol.lastElementChild;
                c.classList.remove('back');
                const v = c.dataset.value;
                c.innerHTML = `<div>${{1:'A',11:'J',12:'Q',13:'K'}[v]||v}</div><div style="font-size:0.7em">♠</div>`;
            }

            selectedPino = null;
            fixOffsets(sourceCol);
            fixOffsets(targetCol);
            checkWin(targetCol);
            updateStats();
        }
    }

    function fixOffsets(col) {
        const cards = Array.from(col.children);
        cards.forEach((c, i) => {
            // Tiukempi pinoaminen: peitetyt 8px, näkyvät 16px
            let offset = 0;
            for(let j=0; j<i; j++) {
                offset += cards[j].classList.contains('back') ? 8 : 16;
            }
            c.style.top = offset + 'px';
        });
    }

    function dealMore() {
        if(currentGame === 'spider') {
            if(deck.length === 0) return;
            for(let i=0; i<10; i++) addCard(i, deck.pop(), true);
        } else if(deck.length > 0) {
            for(let i=0; i<3; i++) addCard(i, deck.pop(), true);
            document.getElementById('deck-btn').style.visibility = 'hidden';
        }
        moves++; score--; updateStats();
    }

    function checkWin(col) {
        const cards = Array.from(col.children);
        if (cards.length < 13) return;
        for (let i = 0; i <= cards.length - 13; i++) {
            let seq = true;
            for (let j = 0; j < 12; j++) {
                if (parseInt(cards[i+j].dataset.value) !== parseInt(cards[i+j+1].dataset.value) + 1 || cards[i+j].classList.contains('back')) {
                    seq = false; break;
                }
            }
            if (seq && parseInt(cards[i].dataset.value) === 13) {
                for (let k = 0; k < 13; k++) col.removeChild(cards[i+k]);
                score += 100;
                if (col.lastElementChild?.classList.contains('back')) {
                     const c = col.lastElementChild;
                     c.classList.remove('back');
                     c.innerHTML = `<div>${{1:'A',11:'J',12:'Q',13:'K'}[c.dataset.value]||c.dataset.value}</div><div style="font-size:0.7em">♠</div>`;
                }
                fixOffsets(col);
                break;
            }
        }
    }

    function updateStats() {
        document.getElementById('move-count').innerText = moves;
        document.getElementById('score').innerText = score;
    }

    window.onload = initGame;
</script>
</body>
</html>
