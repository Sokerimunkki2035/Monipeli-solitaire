<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpio Solitaire</title>

<script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0d4a3a;
  color:white;
}

header {
  padding:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

button,input {
  padding:8px;
  border-radius:6px;
  border:none;
  font-weight:bold;
}

button { background:#2a8b6f; color:white; }

#info { padding:10px; }

#table {
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}

.column { width:70px; }

.card {
  height:90px;
  margin-top:-65px;
  border-radius:6px;
  background:white;
  color:black;
  position:relative;
  padding:6px;
  box-shadow:0 2px 5px rgba(0,0,0,0.4);
  cursor:pointer;
}

.card:first-child { margin-top:0; }

.face-down {
  background:#1a5f4a;
  color:transparent;
  cursor:default;
}

.selected { outline:3px solid yellow; }

.top { position:absolute; top:4px; left:6px; }
.bottom { position:absolute; bottom:4px; right:6px; font-size:18px; }

.red { color:red; }

</style>
</head>

<body>

<header>
<input id="seedInput" placeholder="seed">
<button onclick="newGame()">Uusi peli</button>
<button onclick="dealStock()">Jaa varapakasta</button>
</header>

<div id="info"></div>
<div id="table"></div>

<script>

const suits=["♠","♣","♦","♥"];

let columns=[];
let selected=null;
let stock=[];
let stockDeals=0;

/* ===== PAKKA ===== */
function newDeck(seed){
  Math.seedrandom(seed);
  let deck=[];

  for(let s=0;s<4;s++){
    for(let r=1;r<=13;r++){
      deck.push({s,r,up:true});
    }
  }

  for(let i=deck.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }

  return deck;
}

/* ===== UUSI PELI ===== */
function newGame(){
  let seed=document.getElementById("seedInput").value || Math.random().toString(36).slice(2);
  document.getElementById("seedInput").value=seed;

  let deck=newDeck(seed);

  columns=Array.from({length:7},()=>[]);

  for(let c=0;c<7;c++){
    for(let r=0;r<7;r++){
      let card=deck.pop();

      // 3 ekaa saraketta: 3 alinta piilossa
      card.up = !(c<3 && r<3);

      columns[c].push(card);
    }
  }

  stock = deck;
  stockDeals = 0;
  selected=null;

  draw();
  info("Peli aloitettu");
}

/* ===== PIIRTO ===== */
function draw(){
  const table=document.getElementById("table");
  table.innerHTML="";

  columns.forEach((col,ci)=>{
    let div=document.createElement("div");
    div.className="column";

    col.forEach((card,ri)=>{
      let c=document.createElement("div");
      c.className="card";

      if(!card.up) c.classList.add("face-down");

      if(selected && selected.c===ci && ri>=selected.r){
        c.classList.add("selected");
      }

      if(card.up){
        c.innerHTML=`
          <div class="top ${card.s>=2?'red':''}">
            ${rank(card.r)}${suits[card.s]}
          </div>
          <div class="bottom ${card.s>=2?'red':''}">
            ${suits[card.s]}
          </div>
        `;
      }

      c.onclick=(e)=>{
        e.stopPropagation();
        select(ci,ri);
      };

      div.appendChild(c);
    });

    div.onclick=()=>move(ci);
    table.appendChild(div);
  });
}

/* ===== APU ===== */
function rank(r){
  return {1:"A",11:"J",12:"Q",13:"K"}[r]||r;
}

/* ===== VALINTA ===== */
function select(c,r){
  if(!columns[c][r].up) return;

  selected = (selected && selected.c===c && selected.r===r)
    ? null
    : {c,r};

  draw();
}

/* ===== SIIRTO ===== */
function move(target){
  if(!selected) return;

  let from=columns[selected.c];
  let to=columns[target];
  let moving=from.slice(selected.r);
  let first=moving[0];

  let valid =
    (to.length === 0 && first.r === 13) || // vain K tyhjään
    (to.length > 0 && to[to.length-1].r === first.r + 1);

  if(valid){
    columns[target]=to.concat(moving);
    columns[selected.c]=from.slice(0,selected.r);

    if(columns[selected.c].length){
      columns[selected.c][columns[selected.c].length-1].up=true;
    }

    checkWin();
  }

  selected=null;
  draw();
}

/* ===== VARAPAKKA ===== */
function dealStock(){
  if(stockDeals >= 3){
    info("Varapakka käytetty");
    return;
  }

  for(let i=0;i<7;i++){
    if(stock.length){
      let card=stock.pop();
      card.up=true;
      columns[i].push(card);
    }
  }

  stockDeals++;
  draw();
}

/* ===== VOITTO ===== */
function checkWin(){
  let complete = columns.filter(col =>
    col.length>=13 &&
    col.slice(-13).every((c,i,arr)=>
      i===0 || arr[i-1].r === c.r+1
    )
  );

  if(complete.length===4){
    info("🎉 Voitit pelin!");
  }
}

/* ===== INFO ===== */
function info(msg){
  document.getElementById("info").innerText=msg;
}

newGame();

</script>

</body>
</html>
