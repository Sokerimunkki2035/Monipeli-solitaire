<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spider Time Trial</title>
  <style>
    body { font-family: Arial, sans-serif; background:#006633; color:#fff; margin:0; padding:14px; }
    .toprow { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; align-items:center; margin-bottom:12px; }
    .btn { border:0; border-radius:999px; padding:10px 14px; font-weight:800; cursor:pointer; background:rgba(255,255,255,.18); color:#fff; }
    .btn.primary { background:rgba(120,255,200,.22); }
    #game-board { display:flex; flex-wrap:nowrap; gap:10px; overflow-x:auto; padding:10px 8px 14px; background:rgba(0,0,0,.14); border-radius:16px; }
    .column { flex:0 0 auto; width:78px; height:420px; position:relative; border-radius:14px; background:rgba(255,255,255,.08); padding-top:24px; }
    .card { width:72px; height:104px; background:#fff; color:#000; position:absolute; left:50%; transform:translateX(-50%); border-radius:10px; box-shadow:0 10px 18px rgba(0,0,0,.35); display:flex; flex-direction:column; justify-content:space-between; padding:8px; cursor:grab; touch-action: manipulation; }
    .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:14px; background:rgba(0,0,0,.85); padding:10px 12px; border-radius:14px; display:none; z-index:999; }
    .stats { text-align: center; margin: 10px; font-weight: bold; }
  </style>
</head>

<body>
  <h1>Spider Time Trial</h1>
  <div class="toprow">
    <input id="playerName" placeholder="Pelaajan nimi" style="padding:10px; border-radius:10px; border:0;" />
    <button class="btn primary" onclick="startNewGame()">Aloita peli</button>
    <button class="btn" onclick="undoMove()">↩ Undo</button>
  </div>
  <div class="stats">
    Aika: <span id="timer">00:00</span> | Siirrot: <span id="moves">0</span>
  </div>

  <div id="game-board"></div>

  <div id="leaderboard" style="margin-top:20px; background:rgba(0,0,0,0.2); padding:15px; border-radius:10px;">
    <h3>Tulokset (paikallinen):</h3>
    <ul id="scoreList"></ul>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // --- TÄSSÄ ON SINUN TOIMIVA LOGIIKKASI ---
  let columns = [], moves = 0, undoStack = [], startTime = null, timerInterval = null;

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display='block';
    setTimeout(()=>t.style.display='none', 1500);
  }

  function startNewGame() {
    const name = document.getElementById('playerName').value;
    if(!name) { toast("Kirjoita nimi ensin!"); return; }
    
    // Alustetaan kortit (sinun logiikkasi mukaan)
    moves = 0;
    startTime = null;
    clearInterval(timerInterval);
    document.getElementById('timer').innerText = "00:00";
    document.getElementById('moves').innerText = "0";
    
    // Tähän initGame(2) tai vastaava funktiosi...
    initGame(2); 
    toast("Peli aloitettu!");
  }

  function registerFirstMove() {
    if(!startTime) {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').innerText = 
          Math.floor(diff/60).toString().padStart(2,'0') + ":" + (diff%60).toString().padStart(2,'0');
      }, 1000);
    }
  }

  // --- SINUN ALKUPERÄINEN UNDO-LOGIIKKASI KORJATTUNA SYVÄKOPIOLLE ---
  function undoMove() {
    if(undoStack.length === 0) return;
    const prev = undoStack.pop();
    columns = prev.columns;
    moves = prev.moves;
    document.getElementById('moves').textContent = moves;
    render();
  }

  // Lisää tämä funktio sinun tryMoveStack -funktioosi:
  function saveHistory() {
    undoStack.push({
      columns: JSON.parse(JSON.stringify(columns)),
      moves
    });
  }

  // Voittofunktio tallentaa ajan
  function onWin() {
    clearInterval(timerInterval);
    const name = document.getElementById('playerName').value;
    const time = document.getElementById('timer').innerText;
    const scores = JSON.parse(localStorage.getItem('spiderScores') || '[]');
    scores.push({name, time, moves});
    localStorage.setItem('spiderScores', JSON.stringify(scores));
    updateLeaderboard();
  }

  function updateLeaderboard() {
    const list = document.getElementById('scoreList');
    const scores = JSON.parse(localStorage.getItem('spiderScores') || '[]');
    list.innerHTML = scores.map(s => `<li>${s.name}: ${s.time} (${s.moves} siirtoa)</li>`).join('');
  }

  window.onload = updateLeaderboard;
  // ... liitä loppuosa sinun alkuperäisestä koodistasi tähän ...
</script>
</body>
</html>
