<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Race 2P</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#1b5e20;
    color:white;
}

#top {
    background:#111;
    padding:8px;
    display:flex;
    gap:8px;
    align-items:center;
}

input { width:90px; }

.board {
    display:flex;
    justify-content:center;
    gap:4px;
    padding:10px;
}

.column {
    width:40px;
    height:70vh;
    background:rgba(255,255,255,0.1);
    position:relative;
}

.card {
    width:40px;
    height:60px;
    background:white;
    color:black;
    position:absolute;
    border-radius:4px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.back {
    background:#0d47a1;
}

.dragging {
    opacity:0.8;
    pointer-events:none;
    z-index:9999;
}
</style>
</head>

<body>

<div id="top">
<input id="p1" placeholder="P1">
<input id="p2" placeholder="P2">
<button onclick="startGame()">JAO</button>
<button onclick="undo()">PERUUTA</button>
<div id="stats"></div>
</div>

<div class="board" id="board0"></div>
<div class="board" id="board1"></div>

<script>

let state = {
    players: [
        {name:"", wins:0, games:0},
        {name:"", wins:0, games:0}
    ],
    boards: [[],[]],
    history: [[],[]],
    startTime:0,
    times:[null,null],
    finished:[false,false],
    seed:0
};

let drag = null;

// ---------- STORAGE ----------
function save() {
    localStorage.setItem("spider_race", JSON.stringify(state));
}

function load() {
    const s = localStorage.getItem("spider_race");
    if (s) state = JSON.parse(s);
}

// ---------- RANDOM (SEED) ----------
function seededRandom(seed) {
    return function() {
        seed = (seed * 16807) % 2147483647;
        return (seed - 1) / 2147483646;
    }
}

function createDeck(seed) {
    let rand = seededRandom(seed);
    let d = [];

    for (let i=0;i<8;i++) {
        for (let v=1;v<=13;v++) d.push(v);
    }

    for (let i=d.length-1;i>0;i--) {
        let j = Math.floor(rand()* (i+1));
        [d[i], d[j]] = [d[j], d[i]];
    }

    return d;
}

// ---------- GAME ----------
function startGame() {
    state.players[0].name = document.getElementById("p1").value || "P1";
    state.players[1].name = document.getElementById("p2").value || "P2";

    state.seed = Date.now();
    let deck = createDeck(state.seed);

    state.startTime = Date.now();
    state.times = [null,null];
    state.finished = [false,false];
    state.history = [[],[]];

    for (let p=0;p<2;p++) {
        state.boards[p] = [];
        for (let i=0;i<10;i++) state.boards[p].push([]);

        let d = [...deck];

        for (let i=0;i<54;i++) {
            let col = i%10;
            state.boards[p][col].push({
                v:d.pop(),
                up:i>=44
            });
        }
    }

    renderAll();
    save();
}

// ---------- RENDER ----------
function renderAll() {
    renderBoard(0);
    renderBoard(1);
    updateStats();
}

function renderBoard(p) {
    const board = document.getElementById("board"+p);
    board.innerHTML="";

    state.boards[p].forEach((col,ci)=>{
        const colEl = document.createElement("div");
        colEl.className="column";

        col.forEach((card,i)=>{
            const el = document.createElement("div");
            el.className="card"+(card.up?"":" back");
            el.style.top=(i*(card.up?22:8))+"px";

            if (card.up) el.innerText = card.v;

            el.onpointerdown = e => startDrag(e,p,ci,i);

            colEl.appendChild(el);
        });

        board.appendChild(colEl);
    });
}

// ---------- DRAG ----------
function startDrag(e,p,ci,i) {
    const col = state.boards[p][ci];
    if (!col[i].up) return;

    saveHistory(p);

    drag = {
        p, ci, i,
        cards: col.slice(i)
    };

    col.splice(i);

    document.onpointermove = moveDrag;
    document.onpointerup = endDrag;
}

function moveDrag(e) {}

function endDrag(e) {
    const board = document.getElementById("board"+drag.p);
    const cols = board.children;

    let target = null;

    for (let i=0;i<cols.length;i++) {
        let r = cols[i].getBoundingClientRect();
        if (e.clientX > r.left && e.clientX < r.right) {
            target = i;
        }
    }

    let success = false;

    if (target !== null) {
        let to = state.boards[drag.p][target];
        let first = drag.cards[0].v;

        if (!to.length || to[to.length-1].v === first+1) {
            drag.cards.forEach(c=>to.push(c));
            success = true;
        }
    }

    if (!success) {
        drag.cards.forEach(c=>state.boards[drag.p][drag.ci].push(c));
    } else {
        let src = state.boards[drag.p][drag.ci];
        let last = src[src.length-1];
        if (last && !last.up) last.up = true;
    }

    drag = null;

    renderBoard(0);
    renderBoard(1);
    checkWin();
    save();

    document.onpointermove = null;
    document.onpointerup = null;
}

// ---------- UNDO ----------
function saveHistory(p) {
    state.history[p].push(JSON.stringify(state.boards[p]));
    if (state.history[p].length > 50) state.history[p].shift();
}

function undo() {
    for (let p=0;p<2;p++) {
        if (state.history[p].length) {
            state.boards[p] = JSON.parse(state.history[p].pop());
        }
    }
    renderAll();
}

// ---------- WIN ----------
function checkWin() {
    state.boards.forEach((b,p)=>{
        let total=0;
        b.forEach(c=>total+=c.length);

        if (total===0 && !state.finished[p]) {
            state.finished[p]=true;
            state.times[p]=Date.now()-state.startTime;

            if (state.finished[0] && state.finished[1]) {
                let winner = state.times[0] < state.times[1] ? 0 : 1;

                state.players[winner].wins++;
                state.players[0].games++;
                state.players[1].games++;

                alert(
                    state.players[winner].name+" voitti!\n\n"+
                    state.players[0].name+": "+(state.times[0]/1000).toFixed(1)+"s\n"+
                    state.players[1].name+": "+(state.times[1]/1000).toFixed(1)+"s"
                );

                save();
                updateStats();
            }
        }
    });
}

// ---------- UI ----------
function updateStats() {
    function s(p) {
        let g = p.games||0;
        let w = p.wins||0;
        let pct = g?Math.round(w/g*100):0;
        return `${p.name} ${w}/${g} (${pct}%)`;
    }

    document.getElementById("stats").innerText =
        s(state.players[0])+" vs "+s(state.players[1]);
}

// ---------- INIT ----------
window.onload = () => {
    load();

    document.getElementById("p1").value = state.players[0].name;
    document.getElementById("p2").value = state.players[1].name;

    renderAll();
};

</script>
</body>
</html>
